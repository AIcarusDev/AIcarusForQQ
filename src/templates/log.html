<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日志监控</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #1c2128;
        --border: #30363d;
        --text: #e6edf3;
        --text-sec: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --orange: #d29922;
        --red: #f85149;
        --yellow: #e3b341;
        --purple: #bc8cff;
        --cyan: #39c5cf;
        --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
      }

      html, body {
        height: 100%;
        font-family: var(--font-ui);
        background: var(--bg);
        color: var(--text);
      }

      /* ── Layout ── */
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* ── Header ── */
      .header {
        padding: 11px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        background: var(--surface);
      }
      .header h1 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
      }

      /* tabs */
      .tabs {
        display: flex;
        gap: 2px;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 2px;
        background: var(--bg);
      }
      .tab-btn {
        padding: 4px 14px;
        border-radius: 5px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--text-sec);
        transition: all 0.15s;
        white-space: nowrap;
      }
      .tab-btn:hover { color: var(--text); }
      .tab-btn.active {
        background: var(--surface2);
        color: var(--accent);
        box-shadow: 0 1px 4px rgba(0,0,0,.3);
      }

      /* status row */
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
        flex-shrink: 0;
      }
      .dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        background: var(--red);
        transition: background .3s;
        flex-shrink: 0;
      }
      .dot.ok { background: var(--green); }
      .dot.warn { background: var(--orange); }
      .status-label {
        font-size: 12px;
        color: var(--text-sec);
        white-space: nowrap;
      }
      .sep { color: var(--border); font-size: 14px; }

      /* nav links */
      .nav-links {
        display: flex;
        gap: 6px;
        margin-left: 8px;
        flex-shrink: 0;
      }
      .nav-links a {
        font-size: 12px;
        color: var(--text-sec);
        text-decoration: none;
        padding: 3px 10px;
        border: 1px solid var(--border);
        border-radius: 5px;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .nav-links a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* action buttons */
      .hdr-btn {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-sec);
        padding: 4px 12px;
        border-radius: 5px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

      /* ── Tab panels ── */
      .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
      .tab-panel.active { display: flex; }

      /* ══════════════════════════════
         CHAT TAB
      ══════════════════════════════ */
      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .chat-area::-webkit-scrollbar { width: 5px; }
      .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      /* conv badge */
      .conv-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        padding: 1px 7px;
        border-radius: 20px;
        font-weight: 600;
        flex-shrink: 0;
      }
      .conv-badge.group { background: rgba(63,185,80,.12); color: var(--green); }
      .conv-badge.private { background: rgba(210,169,34,.12); color: var(--orange); }
      .conv-badge.unknown { background: rgba(88,166,255,.08); color: var(--accent); }

      /* user message row */
      .msg-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-width: 80%;
      }
      .msg-row.user { align-self: flex-end; align-items: flex-end; }
      .msg-row.bot  { align-self: flex-start; align-items: flex-start; }

      .msg-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-sec);
      }
      .msg-meta .sender { font-weight: 600; color: var(--accent); }
      .msg-meta.user-meta .sender { color: var(--orange); }

      .bubble {
        padding: 9px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.55;
        word-break: break-word;
        white-space: pre-wrap;
      }
      .bubble.user-bubble {
        background: #1c2e4a;
        border: 1px solid #183860;
        border-radius: 12px 12px 4px 12px;
        color: #a8c8f0;
      }
      .bubble.bot-bubble {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px 12px 12px 12px;
        color: var(--text);
      }

      /* inner state card */
      .inner-state {
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        width: 100%;
      }
      .inner-state summary {
        padding: 5px 12px;
        cursor: pointer;
        color: var(--text-sec);
        background: rgba(255,255,255,.03);
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }
      .inner-state summary::-webkit-details-marker { display: none; }
      .inner-state summary::before {
        content: "▶";
        font-size: 9px;
        transition: transform .15s;
      }
      .inner-state[open] summary::before { transform: rotate(90deg); }
      .inner-state summary:hover { background: rgba(255,255,255,.06); }
      .inner-state-body {
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        border-top: 1px solid var(--border);
      }
      .is-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 12px;
      }
      .is-tag {
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 20px;
        color: #fff;
        line-height: 1.5;
      }
      .tag-mood { background: var(--orange); }
      .tag-think { background: var(--purple); }
      .tag-intent { background: var(--cyan); color: #000; }
      .is-val { color: var(--text-sec); line-height: 1.5; }

      .chat-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-sec);
        gap: 12px;
      }
      .chat-empty .icon { font-size: 40px; opacity: .3; }
      .chat-empty .hint { font-size: 13px; }

      /* chat auto-scroll bar */
      .chat-footer {
        padding: 5px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--text-sec);
        flex-shrink: 0;
      }
      .chat-footer label { display: flex; align-items: center; gap: 5px; }
      .chat-footer input[type=checkbox] { accent-color: var(--accent); }
      .chat-footer .msg-count { margin-left: auto; }

      /* ══════════════════════════════
         LOG TAB
      ══════════════════════════════ */
      .log-toolbar {
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        flex-shrink: 0;
      }

      .filter-btns { display: flex; gap: 3px; }
      .filter-btn {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 4px;
        border: 1px solid var(--border);
        cursor: pointer;
        background: transparent;
        color: var(--text-sec);
        transition: all .15s;
        font-family: var(--font-mono);
      }
      .filter-btn:hover { color: var(--text); border-color: var(--text-sec); }
      .filter-btn.active-ALL  { background: rgba(88,166,255,.15); border-color: var(--accent); color: var(--accent); }
      .filter-btn.active-DEBUG { background: rgba(57,197,207,.1); border-color: var(--cyan); color: var(--cyan); }
      .filter-btn.active-INFO  { background: rgba(63,185,80,.12); border-color: var(--green); color: var(--green); }
      .filter-btn.active-WARNING { background: rgba(227,179,65,.12); border-color: var(--yellow); color: var(--yellow); }
      .filter-btn.active-ERROR { background: rgba(248,81,73,.15); border-color: var(--red); color: var(--red); }

      .module-filter {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 3px 9px;
        color: var(--text);
        font-size: 12px;
        width: 180px;
        outline: none;
        transition: border-color .15s;
      }
      .module-filter:focus { border-color: var(--accent); }
      .module-filter::placeholder { color: var(--text-sec); }

      .log-count {
        font-size: 12px;
        color: var(--text-sec);
        margin-left: auto;
      }
      .log-count span { color: var(--red); font-weight: 600; }

      .log-list {
        flex: 1;
        overflow-y: auto;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.5;
      }
      .log-list::-webkit-scrollbar { width: 5px; }
      .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

      .log-entry {
        display: grid;
        grid-template-columns: 70px 52px 1fr;
        gap: 0 10px;
        padding: 4px 16px;
        border-bottom: 1px solid rgba(48,54,61,.5);
        align-items: baseline;
        transition: background .1s;
      }
      .log-entry:hover { background: rgba(255,255,255,.03); }
      .log-entry.level-ERROR,
      .log-entry.level-CRITICAL {
        background: rgba(248,81,73,.07);
        border-bottom-color: rgba(248,81,73,.2);
      }
      .log-entry.level-ERROR:hover,
      .log-entry.level-CRITICAL:hover { background: rgba(248,81,73,.12); }

      .log-time { color: var(--text-sec); }
      .log-level {
        font-weight: 700;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        text-align: center;
        white-space: nowrap;
      }
      .lvl-DEBUG   { color: var(--cyan);   background: rgba(57,197,207,.1); }
      .lvl-INFO    { color: var(--green);  background: rgba(63,185,80,.12); }
      .lvl-WARNING { color: var(--yellow); background: rgba(227,179,65,.12); }
      .lvl-ERROR   { color: var(--red);    background: rgba(248,81,73,.18); }
      .lvl-CRITICAL{ color: #fff;          background: var(--red); }

      .log-body { min-width: 0; }
      .log-origin {
        font-size: 10px;
        color: var(--text-sec);
        opacity: .7;
        margin-right: 6px;
      }
      .log-msg {
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .log-entry.level-ERROR .log-msg,
      .log-entry.level-CRITICAL .log-msg { color: #ffb3ae; }

      /* expand multi-line */
      .log-msg-collapsed { display: none; }
      .log-msg-short { cursor: pointer; }
      .log-msg-short:hover { text-decoration: underline; text-decoration-style: dotted; }

      .log-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-sec);
        font-size: 13px;
        flex-direction: column;
        gap: 10px;
      }
      .log-empty .icon { font-size: 36px; opacity: .25; }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <div class="header">
        <h1>🐾 日志监控</h1>

        <div class="tabs">
          <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">💬 聊天记录</button>
          <button class="tab-btn" data-tab="log" onclick="switchTab('log')">📋 调试日志</button>
        </div>

        <div class="status-row">
          <div class="dot" id="wsDot"></div>
          <span class="status-label" id="wsLabel">未连接</span>
          <span class="sep">|</span>
          <div class="dot warn" id="ncDot"></div>
          <span class="status-label" id="ncLabel">NapCat 未知</span>
        </div>

        <div class="nav-links">
          <a href="/">💬 互动沙盒</a>
          <a href="/settings">⚙️ 配置</a>
        </div>
      </div>

      <!-- ══ CHAT TAB ══ -->
      <div class="tab-panel active" id="panel-chat">
        <div class="chat-area" id="chatArea">
          <div class="chat-empty" id="chatEmpty">
            <div class="icon">📡</div>
            <div class="hint">等待 QQ 消息...</div>
            <div class="hint" style="font-size:11px;opacity:.6">NapCat 连接后自动显示实时聊天记录</div>
          </div>
        </div>
        <div class="chat-footer">
          <label><input type="checkbox" id="chatAutoScroll" checked /> 自动滚动</label>
          <span class="msg-count">消息: <strong id="chatMsgCount">0</strong></span>
          <button class="hdr-btn" onclick="clearChat()">清空</button>
        </div>
      </div>

      <!-- ══ LOG TAB ══ -->
      <div class="tab-panel" id="panel-log">
        <div class="log-toolbar">
          <div class="filter-btns" id="filterBtns">
            <button class="filter-btn active-ALL" data-level="ALL"    onclick="setLevelFilter('ALL')">ALL</button>
            <button class="filter-btn"            data-level="DEBUG"  onclick="setLevelFilter('DEBUG')">DBG</button>
            <button class="filter-btn"            data-level="INFO"   onclick="setLevelFilter('INFO')">INF</button>
            <button class="filter-btn"            data-level="WARNING" onclick="setLevelFilter('WARNING')">WRN</button>
            <button class="filter-btn"            data-level="ERROR"  onclick="setLevelFilter('ERROR')">ERR</button>
          </div>
          <input class="module-filter" id="moduleFilter" placeholder="过滤模块名 (如 AICQ.app)" oninput="applyFilters()" />
          <span class="log-count">共 <strong id="logTotal">0</strong> 条 / 报错 <span id="logErrors">0</span> 条</span>
          <button class="hdr-btn" onclick="clearLog()">清空</button>
          <label style="font-size:12px;color:var(--text-sec);display:flex;align-items:center;gap:5px;">
            <input type="checkbox" id="logAutoScroll" checked style="accent-color:var(--accent);" /> 自动滚动
          </label>
        </div>
        <div class="log-list" id="logList">
          <div class="log-empty" id="logEmpty">
            <div class="icon">🔍</div>
            <div>等待日志...</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      /* ══════════════════════════════════
         Helpers
      ══════════════════════════════════ */
      function el(tag, cls) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function fmtTs(iso) {
        try { return new Date(iso).toLocaleTimeString("zh-CN", {hour:"2-digit", minute:"2-digit", second:"2-digit"}); }
        catch { return iso || ""; }
      }

      /* ══════════════════════════════════
         Tab switching
      ══════════════════════════════════ */
      let currentTab = "chat";
      function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + tab));
      }

      /* ══════════════════════════════════
         Status polling
      ══════════════════════════════════ */
      function pollStatus() {
        fetch("/debug/api/status").then(r => r.json()).then(d => {
          const dot = document.getElementById("ncDot");
          const lbl = document.getElementById("ncLabel");
          if (d.napcat_connected) {
            dot.className = "dot ok";
            lbl.textContent = "NapCat" + (d.bot_id ? " QQ:" + d.bot_id : " 已连接");
          } else {
            dot.className = "dot";
            lbl.textContent = "NapCat 未连接";
          }
        }).catch(() => {
          document.getElementById("ncDot").className = "dot warn";
          document.getElementById("ncLabel").textContent = "NapCat 未知";
        });
      }
      pollStatus();
      setInterval(pollStatus, 8000);

      /* ══════════════════════════════════
         CHAT WebSocket
      ══════════════════════════════════ */
      let chatMsgCount = 0;
      let chatWs = null;

      function connectChatWs() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        chatWs = new WebSocket(`${proto}//${location.host}/log/ws/chat`);

        chatWs.onopen = () => {
          document.getElementById("wsDot").className = "dot ok";
          document.getElementById("wsLabel").textContent = "已连接";
        };
        chatWs.onclose = () => {
          document.getElementById("wsDot").className = "dot";
          document.getElementById("wsLabel").textContent = "已断开 — 重连中";
          setTimeout(connectChatWs, 3000);
        };
        chatWs.onerror = () => chatWs.close();
        chatWs.onmessage = (evt) => {
          try { onChatEvent(JSON.parse(evt.data)); } catch(e) {}
        };
      }

      function onChatEvent(payload) {
        if (payload.type === "user_message") {
          renderUserMessage(payload);
        } else if (payload.type === "bot_turn") {
          renderBotTurn(payload);
        }
      }

      function getChatArea() {
        const area = document.getElementById("chatArea");
        // remove empty state
        const empty = document.getElementById("chatEmpty");
        if (empty) empty.remove();
        return area;
      }

      function scrollChatEnd() {
        if (!document.getElementById("chatAutoScroll").checked) return;
        const area = document.getElementById("chatArea");
        area.scrollTop = area.scrollHeight;
      }

      function renderUserMessage(payload) {
        const area = getChatArea();
        const entry = payload.entry || {};
        const senderName = entry.sender_name || "未知";
        const content = entry.content || "";
        const ts = fmtTs(entry.timestamp);
        const convType = payload.conv_type || "unknown";
        const convName = payload.conv_name || payload.conv_id || "";

        const row = el("div", "msg-row user");

        // meta row
        const meta = el("div", "msg-meta user-meta");
        meta.innerHTML =
          `<span class="conv-badge ${esc(convType)}">${esc(convName)}</span>` +
          `<span class="sender">${esc(senderName)}</span>` +
          `<span>${esc(ts)}</span>`;
        row.appendChild(meta);

        // bubble
        const bubble = el("div", "bubble user-bubble");
        bubble.textContent = content;
        row.appendChild(bubble);

        area.appendChild(row);
        chatMsgCount++;
        document.getElementById("chatMsgCount").textContent = chatMsgCount;
        scrollChatEnd();
      }

      function renderBotTurn(payload) {
        const area = getChatArea();
        const entries = payload.entries || [];
        const inner = payload.inner_state || {};
        const convType = payload.conv_type || "unknown";
        const convName = payload.conv_name || payload.conv_id || "";

        const row = el("div", "msg-row bot");

        // meta row (once for the turn)
        const firstEntry = entries[0] || {};
        const botName = firstEntry.sender_name || "Bot";
        const ts = fmtTs(firstEntry.timestamp);
        const meta = el("div", "msg-meta");
        meta.innerHTML =
          `<span class="conv-badge ${esc(convType)}">${esc(convName)}</span>` +
          `<span class="sender">${esc(botName)}</span>` +
          `<span>${esc(ts)}</span>`;
        row.appendChild(meta);

        // inner state card (if any content)
        const hasInner = inner.mood || inner.think || inner.intent;
        if (hasInner) {
          const details = document.createElement("details");
          details.className = "inner-state";

          const summary = document.createElement("summary");
          summary.textContent = " 内心状态";
          details.appendChild(summary);

          const body = el("div", "inner-state-body");
          const addRow = (tag, cls, val) => {
            if (!val) return;
            const r = el("div", "is-row");
            r.innerHTML = `<span class="is-tag ${cls}">${tag}</span><span class="is-val">${esc(val)}</span>`;
            body.appendChild(r);
          };
          addRow("情绪", "tag-mood", inner.mood);
          addRow("思考", "tag-think", inner.think);
          addRow("意图", "tag-intent", inner.intent);
          details.appendChild(body);
          row.appendChild(details);
        }

        // bubbles
        for (const entry of entries) {
          if (!entry.content) continue;
          const bubble = el("div", "bubble bot-bubble");
          bubble.textContent = entry.content;
          row.appendChild(bubble);
        }

        area.appendChild(row);
        chatMsgCount++;
        document.getElementById("chatMsgCount").textContent = chatMsgCount;
        scrollChatEnd();
      }

      function clearChat() {
        const area = document.getElementById("chatArea");
        area.innerHTML = '<div class="chat-empty" id="chatEmpty"><div class="icon">📡</div><div class="hint">等待 QQ 消息...</div></div>';
        chatMsgCount = 0;
        document.getElementById("chatMsgCount").textContent = 0;
      }

      /* ══════════════════════════════════
         LOG WebSocket
      ══════════════════════════════════ */
      let logAll = [];         // 所有原始记录
      let logTotal = 0;
      let logErrors = 0;
      let activeLevel = "ALL";
      let logWs = null;

      function connectLogWs() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        logWs = new WebSocket(`${proto}//${location.host}/log/ws/log`);
        logWs.onclose = () => setTimeout(connectLogWs, 3000);
        logWs.onerror = () => logWs.close();
        logWs.onmessage = (evt) => {
          try { onLogRecord(JSON.parse(evt.data)); } catch(e) {}
        };
      }

      function onLogRecord(rec) {
        logAll.push(rec);
        logTotal++;
        if (rec.level === "ERROR" || rec.level === "CRITICAL") logErrors++;
        document.getElementById("logTotal").textContent = logTotal;
        document.getElementById("logErrors").textContent = logErrors;

        // remove empty state
        const empty = document.getElementById("logEmpty");
        if (empty) empty.remove();

        if (!matchesFilter(rec)) return;
        appendLogEntry(rec);
      }

      function matchesFilter(rec) {
        if (activeLevel !== "ALL") {
          const order = ["DEBUG","INFO","WARNING","ERROR","CRITICAL"];
          if (order.indexOf(rec.level) < order.indexOf(activeLevel)) return false;
          // ERROR filter shows ERROR + CRITICAL
          if (activeLevel === "ERROR" && rec.level !== "ERROR" && rec.level !== "CRITICAL") return false;
          // exact match for DEBUG, INFO, WARNING
          if (activeLevel === "DEBUG" || activeLevel === "INFO" || activeLevel === "WARNING") {
            if (rec.level !== activeLevel) return false;
          }
        }
        const mod = document.getElementById("moduleFilter").value.trim().toLowerCase();
        if (mod && !(rec.name || "").toLowerCase().includes(mod)) return false;
        return true;
      }

      function appendLogEntry(rec) {
        const list = document.getElementById("logList");
        const entry = el("div", `log-entry level-${rec.level}`);

        const timeEl = el("div", "log-time");
        timeEl.textContent = rec.time || "";

        const levelEl = el("div", `log-level lvl-${rec.level}`);
        levelEl.textContent = rec.level === "WARNING" ? "WARN" : rec.level;

        const bodyEl = el("div", "log-body");
        const origin = el("span", "log-origin");
        origin.textContent = `${rec.name || ""}  ${rec.file || ""}:${rec.lineno || ""}`;

        const msgEl = el("span", "log-msg");
        const lines = (rec.message || "").split("\n");
        if (lines.length <= 1) {
          msgEl.textContent = rec.message || "";
        } else {
          // Collapsible multi-line
          const short = el("span", "log-msg-short");
          short.textContent = lines[0] + " (+)";
          const full = el("span", "log-msg-collapsed");
          full.textContent = rec.message || "";
          let expanded = false;
          short.onclick = () => {
            expanded = !expanded;
            short.style.display = expanded ? "none" : "";
            full.style.display = expanded ? "" : "none";
          };
          full.onclick = () => {
            expanded = false;
            short.style.display = "";
            full.style.display = "none";
          };
          msgEl.appendChild(short);
          msgEl.appendChild(full);
        }

        bodyEl.appendChild(origin);
        bodyEl.appendChild(msgEl);
        entry.appendChild(timeEl);
        entry.appendChild(levelEl);
        entry.appendChild(bodyEl);
        list.appendChild(entry);

        if (document.getElementById("logAutoScroll").checked) {
          list.scrollTop = list.scrollHeight;
        }
      }

      function setLevelFilter(level) {
        activeLevel = level;
        document.querySelectorAll(".filter-btn").forEach(b => {
          const active = b.dataset.level === level;
          b.className = "filter-btn" + (active ? ` active-${level}` : "");
        });
        rebuildLogList();
      }

      function applyFilters() {
        rebuildLogList();
      }

      function rebuildLogList() {
        const list = document.getElementById("logList");
        list.innerHTML = "";
        let shown = 0;
        for (const rec of logAll) {
          if (matchesFilter(rec)) { appendLogEntry(rec); shown++; }
        }
        if (shown === 0 && logAll.length > 0) {
          list.innerHTML = '<div class="log-empty"><div class="icon">🔍</div><div>当前过滤条件下无匹配记录</div></div>';
        } else if (logAll.length === 0) {
          list.innerHTML = '<div class="log-empty"><div class="icon">🔍</div><div>等待日志...</div></div>';
        }
      }

      function clearLog() {
        logAll = [];
        logTotal = 0;
        logErrors = 0;
        document.getElementById("logTotal").textContent = 0;
        document.getElementById("logErrors").textContent = 0;
        document.getElementById("logList").innerHTML = '<div class="log-empty" id="logEmpty"><div class="icon">🔍</div><div>等待日志...</div></div>';
      }

      /* ══════════════════════════════════
         Init
      ══════════════════════════════════ */
      connectChatWs();
      connectLogWs();
    </script>
  </body>
</html>
